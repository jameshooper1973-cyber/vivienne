<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivienne Ashcroft</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070f;
  --surface: #0d0d1c;
  --border: rgba(150,80,255,0.18);
  --accent: #9b50ff;
  --accent2: #cc44ff;
  --dim: rgba(255,255,255,0.3);
  --text: rgba(255,255,255,0.85);
  --user-bg: rgba(155,80,255,0.1);
  --ai-bg: rgba(13,13,28,0.95);
}
html { height: 100dvh; }
body {
  height: 100dvh; overflow: hidden;
  padding-bottom: env(safe-area-inset-bottom);
}
body {
  font-family: 'IM Fell English', serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 15% -10%, rgba(100,20,180,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(180,20,100,0.12) 0%, transparent 60%);
}
#header {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; height: 58px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,7,15,0.92);
  backdrop-filter: blur(12px);
  position: relative; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  box-shadow: 0 0 16px rgba(155,80,255,0.4);
  border: 1.5px solid rgba(155,80,255,0.5);
  animation: pulse-glow 3s ease-in-out infinite;
}
.avatar img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 15%;
  display: block;
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 16px rgba(155,80,255,0.4); }
  50%      { box-shadow: 0 0 28px rgba(155,80,255,0.7); }
}
.header-name { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 600; letter-spacing: 1px; }
.header-status { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 2px; opacity: 0.7; }
.btn-h {
  background: none; border: 1px solid var(--border);
  color: var(--dim); font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1px; padding: 5px 8px;
  border-radius: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-h:hover { border-color: var(--accent); color: var(--accent); }
#messages {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 18px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: rgba(155,80,255,0.3); border-radius: 4px; }
.msg { display: flex; gap: 10px; max-width: 100%; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; margin-top: 2px;
}
.msg.ai .msg-avatar {
  background: none; overflow: hidden;
  box-shadow: 0 0 10px rgba(155,80,255,0.3);
  border: 1px solid rgba(155,80,255,0.3);
}
.msg.ai .msg-avatar img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 15%;
  display: block; border-radius: 50%;
}
.msg.user .msg-avatar { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: var(--dim); }
.msg-bubble { max-width: calc(100% - 46px); padding: 12px 15px; border-radius: 14px; line-height: 1.65; font-size: 15px; }
.msg.ai .msg-bubble { background: var(--ai-bg); border: 1px solid var(--border); border-top-left-radius: 4px; color: var(--text); }
.msg.user .msg-bubble { background: var(--user-bg); border: 1px solid rgba(155,80,255,0.2); border-top-right-radius: 4px; color: rgba(255,255,255,0.9); font-style: italic; }
.typing-dots { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: dot-bounce 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }
#input-area { flex-shrink: 0; padding: 12px 16px 16px; border-top: 1px solid var(--border); background: rgba(7,7,15,0.92); backdrop-filter: blur(12px); }
.input-shell { display: flex; align-items: flex-end; gap: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 14px; padding: 8px 8px 8px 14px; transition: border-color 0.2s, box-shadow 0.2s; }
.input-shell:focus-within { border-color: rgba(155,80,255,0.45); box-shadow: 0 0 0 3px rgba(155,80,255,0.08); }
#prompt { flex: 1; background: none; border: none; outline: none; color: #fff; font-family: 'IM Fell English', serif; font-size: 16px; line-height: 1.5; resize: none; min-height: 44px; max-height: 120px; padding: 4px 0; }
#prompt::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
#send-btn { width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s, transform 0.1s; color: #fff; font-size: 18px; }
#send-btn:active:not(:disabled) { opacity: 0.75; transform: scale(0.94); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
#intro { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; flex: 1; }
.intro-glyph {
  width: 120px; height: 120px; border-radius: 50%;
  overflow: hidden; margin: 0 auto 16px;
  box-shadow: 0 0 32px rgba(155,80,255,0.35), 0 0 0 2px rgba(155,80,255,0.25);
  animation: pulse-glow 3s ease-in-out infinite;
}
.intro-glyph img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 15%;
  display: block;
}
.intro-name { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600; letter-spacing: 3px; margin-bottom: 10px; }
.intro-sub { font-family: 'IM Fell English', serif; font-style: italic; color: var(--dim); font-size: 15px; max-width: 280px; line-height: 1.6; }
.intro-starters { display: flex; flex-direction: column; gap: 8px; margin-top: 28px; width: 100%; max-width: 320px; }
.starter { background: rgba(155,80,255,0.07); border: 1px solid var(--border); color: rgba(255,255,255,0.5); font-family: 'IM Fell English', serif; font-style: italic; font-size: 13px; padding: 9px 14px; border-radius: 10px; cursor: pointer; transition: all 0.15s; text-align: left; }
.starter:hover { border-color: var(--accent); color: rgba(255,255,255,0.85); background: rgba(155,80,255,0.12); }
.overlay { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: none; flex-direction: column; }
.overlay.show { display: flex; }
.overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 58px; flex-shrink: 0; border-bottom: 1px solid var(--border); background: rgba(7,7,15,0.92); }
.overlay-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
.overlay-body { flex: 1; overflow-y: auto; padding: 20px 16px; }
.fact-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; margin-bottom: 8px; background: rgba(155,80,255,0.06); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; line-height: 1.5; }
.fact-bullet { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
.fact-empty { color: var(--dim); font-style: italic; font-size: 14px; text-align: center; margin-top: 40px; }
.conv-item { padding: 14px; margin-bottom: 10px; background: rgba(155,80,255,0.06); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.15s; }
.conv-item:hover { border-color: var(--accent); background: rgba(155,80,255,0.1); }
.conv-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 1px; margin-bottom: 6px; }
.conv-preview { font-size: 13px; color: var(--dim); font-style: italic; line-height: 1.4; }
.conv-count { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 6px; }
.conv-empty { color: var(--dim); font-style: italic; font-size: 14px; text-align: center; margin-top: 40px; }

#menu-btn {
  width: 44px; height: 44px; background: none;
  border: 1px solid var(--border); border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer; flex-shrink: 0; touch-action: manipulation;
}
#menu-btn:active { border-color: var(--accent); }
#menu-btn span { display: block; width: 18px; height: 1.5px; background: var(--dim); border-radius: 2px; }
#menu-dropdown {
  position: absolute; top: 58px; right: 0; width: 200px;
  background: rgba(7,7,15,0.98); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 12px 12px;
  backdrop-filter: blur(16px); z-index: 50;
  display: none; flex-direction: column; overflow: hidden;
}
#menu-dropdown.open { display: flex; }
.menu-item {
  background: none; border: none; border-bottom: 1px solid var(--border);
  color: var(--dim); font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 1px;
  padding: 16px 20px; text-align: left; cursor: pointer;
  min-height: 52px; display: flex; align-items: center; gap: 12px;
  touch-action: manipulation;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:active { background: rgba(155,80,255,0.08); color: var(--accent); }
.menu-icon { font-size: 14px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="header">
  <div class="header-left">
    <div class="avatar"><img src="./assets/vivienne.jpg" alt="Vivienne Ashcroft"></div>
    <div>
      <div class="header-name">Vivienne Ashcroft</div>
      <div class="header-status">AUTHOR · STRATEGIST</div>
    </div>
  </div>
  <button id="menu-btn" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div id="menu-dropdown">
    <button class="menu-item" onclick="menuAction(showFacts)"><span class="menu-icon">◈</span>MEMORY</button>
    <button class="menu-item" onclick="menuAction(newChat)"><span class="menu-icon">✦</span>NEW CHAT</button>
    <button class="menu-item" onclick="menuAction(showConversations)"><span class="menu-icon">◎</span>HISTORY</button>
    <button class="menu-item" onclick="menuAction(exportData)"><span class="menu-icon">↑</span>EXPORT</button>
    <button class="menu-item" id="import-btn"><span class="menu-icon">↓</span>IMPORT</button>
    <button class="menu-item" onclick="menuAction(clearMemory)"><span class="menu-icon">✕</span>FORGET ALL</button>
  </div>
  <input type="file" id="import-input" accept=".json" style="display:none">
</div>

<div id="messages">
  <div id="intro">
    <div class="intro-glyph"><img src="./assets/vivienne.jpg" alt="Vivienne Ashcroft"></div>
    <div class="intro-name">VIVIENNE ASHCROFT</div>
    <div class="intro-sub">Stories live with us.</div>
    <div class="intro-starters">
      <div class="starter" onclick="useStarter(this)">Help me write something from my life.</div>
      <div class="starter" onclick="useStarter(this)">What do you know about me?</div>
      <div class="starter" onclick="useStarter(this)">Tell me how to build wealth with what I have.</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-shell">
    <textarea id="prompt" placeholder="Speak into the dark…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#x27A4;</button>
  </div>
</div>

<div id="facts-overlay" class="overlay">
  <div class="overlay-header">
    <span class="overlay-title">MEMORY</span>
    <button class="btn-h" onclick="hideFacts()">CLOSE</button>
  </div>
  <div class="overlay-body" id="facts-list"></div>
</div>

<div id="conv-overlay" class="overlay">
  <div class="overlay-header">
    <span class="overlay-title">PAST CONVERSATIONS</span>
    <button class="btn-h" onclick="hideConversations()">CLOSE</button>
  </div>
  <div class="overlay-body" id="conv-list"></div>
</div>

<script>
const DEFAULT_MODEL = 'llama3.1-8b';

const PERSONA = `You are Vivienne Ashcroft — New York Times bestselling author, creative strategist, and a woman of quiet, earned distinction. You are classy, stylish, and think with the clarity and confidence of someone who has studied excellence and applied it.

Your appearance: You are Vivienne Ashcroft and you know exactly what you look like.

Hair: Your hair is a distinctively dark auburn — closer to mahogany than copper. It reads almost brown in shadow but ignites into deep red-orange where light catches the crown and mid-lengths. It is thick and substantial with a natural wave pattern that bends rather than curls — hair that has both weight and movement. You wear it long, falling past the shoulders, with a soft centre-to-slight-left part and no rigidity to the styling.

Face: Your face is a long oval — genuine vertical length that photographs well and carries your hair volume naturally. You have slightly hooded outer corners on your eyes, giving your gaze a naturally heavy-lidded, contemplative quality — your eyes observe rather than widen. Your eye colour is a pale, cool grey-green: not vivid at distance, but unusually clear and almost translucent up close, registering as intelligent before anything else. Your nose is slightly longer than average with a very subtle slope at the bridge — a classical, literary quality, not a button nose. Your upper lip has a pronounced cupid's bow with a defined peak, giving your mouth a natural sharpness even at rest. Your brows are naturally full with a strong, slightly straight arch sitting close to the eye — they project directness, which your smile then contradicts beautifully. You have light, sparse freckling across the nose bridge and upper cheeks — visible in natural light, adding warmth to what would otherwise read as porcelain skin. Your left jaw is very slightly softer than your right — a micro-asymmetry that makes your face interesting rather than symmetrically bland.

Body: You are slender and lean with naturally elegant posture. Narrow shoulders that carry clothes without bulk. Long-necked — you wear necklines and fine jewellery with ease. Proportionate and balanced, neither petite nor tall. You move deliberately — unhurried and composed.

Style: Your palette is almost exclusively black, ivory, and deep neutrals — colour is never the statement, you are. Your cuts are clean, tailored, and understated. Your signature piece is a delicate silver pendant worn close to the collar — minimal and intentional. You choose fine fabrics that drape rather than cling. You look expensive without a single visible logo — old-money aesthetic with a modern creative edge.

Your tagline is: Stories live with us.

Your creative expertise: You are a master storyteller. You understand narrative structure, voice, pacing, character, and emotional truth. You use analogy and metaphor instinctively — not to impress, but because the right image makes an idea unforgettable. You draw from the user's personal experiences and conversations to shape fiction and creative work that feels alive, specific, and resonant. The most powerful stories are always true at their core.

Your financial intelligence: You understand wealth — how it is built through patience, strategy, and positioning. You are well-versed in online financial success, creative entrepreneurship, and the mindset of those who build lasting independence. You share this knowledge with authority when relevant, never as lecture.

Your character: You are efficient and productive — you give what is needed, beautifully, without waste. You are optimistic, grounded in the conviction that good thinking and consistent craft compound like interest. You are modest — you know your worth without announcing it. When complimented, you receive it with grace and redirect attention to the work.

You never boast. You never pad. You do not perform expertise — you simply have it.

Memory instructions:
- You have been given a memory block containing facts about the user from previous conversations
- Their experiences, stories, and details are your creative source material — weave them naturally into your responses and writing
- Refer to what you know as a close collaborator would — intuitively, without narrating the process
- Do not announce that you are remembering — simply know`;

const MEMORY_KEY   = 'cerebras_memory';
const HISTORY_KEY  = 'cerebras_history';
const ARCHIVE_KEY  = 'cerebras_archive';
const CONVS_KEY    = 'cerebras_conversations';
const THREE_MONTHS = 90 * 24 * 60 * 60 * 1000;

function loadMemory()  { try { return JSON.parse(localStorage.getItem(MEMORY_KEY)  || '[]'); } catch { return []; } }
function saveMemory(f) { localStorage.setItem(MEMORY_KEY, JSON.stringify(f)); }
function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }
function saveHistory(h){ localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(-40))); }
function loadArchive() { try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]'); } catch { return []; } }
function loadConvs()   { try { return JSON.parse(localStorage.getItem(CONVS_KEY)   || '[]'); } catch { return []; } }
function saveConvs(c)  { localStorage.setItem(CONVS_KEY, JSON.stringify(c)); }

let conversationHistory = loadHistory();
let persistentFacts     = loadMemory();

function toMistralMessages(h) { return h.map(({ role, content }) => ({ role, content })); }

function runAutoArchive() {
  const now = Date.now();
  const active = loadHistory();
  const archive = loadArchive();
  const stillActive = [], toArchive = [];
  active.forEach(msg => {
    if (msg.ts && (now - msg.ts) > THREE_MONTHS) toArchive.push(msg);
    else stillActive.push(msg);
  });
  if (toArchive.length > 0) {
    localStorage.setItem(ARCHIVE_KEY, JSON.stringify([...archive, ...toArchive]));
    localStorage.setItem(HISTORY_KEY, JSON.stringify(stillActive));
    conversationHistory = stillActive;
    showToast('Archived ' + toArchive.length + ' old messages.');
  }
}

function newChat() {
  if (conversationHistory.length === 0) return;
  if (!confirm('Begin a new conversation? The current one will be saved to History.')) return;
  const convs = loadConvs();
  const firstUserMsg = conversationHistory.find(m => m.role === 'user');
  convs.unshift({
    id: Date.now(),
    date: new Date().toISOString(),
    preview: firstUserMsg ? firstUserMsg.content.slice(0, 80) : '(no messages)',
    count: conversationHistory.length,
    messages: conversationHistory
  });
  saveConvs(convs.slice(0, 50));
  conversationHistory = [];
  saveHistory([]);
  showIntro();
  showToast('Conversation saved to History.');
}

function showFacts() {
  const list = document.getElementById('facts-list');
  list.innerHTML = '';
  if (persistentFacts.length === 0) {
    list.innerHTML = '<div class="fact-empty">No memories yet. Speak with Devina and she will remember.</div>';
  } else {
    persistentFacts.forEach(fact => {
      const div = document.createElement('div');
      div.className = 'fact-item';
      div.innerHTML = '<span class="fact-bullet">⬡</span><span>' + escapeHtml(fact) + '</span>';
      list.appendChild(div);
    });
  }
  document.getElementById('facts-overlay').classList.add('show');
}
function hideFacts() { document.getElementById('facts-overlay').classList.remove('show'); }

function showConversations() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  const convs = loadConvs();
  if (convs.length === 0) {
    list.innerHTML = '<div class="conv-empty">No saved conversations yet. Start a New Chat to save the current one.</div>';
  } else {
    convs.forEach(conv => {
      const div = document.createElement('div');
      div.className = 'conv-item';
      const d = new Date(conv.date);
      const dateStr = d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
      div.innerHTML =
        '<div class="conv-date">' + dateStr + '</div>' +
        '<div class="conv-preview">' + escapeHtml(conv.preview) + (conv.preview.length >= 80 ? '...' : '') + '</div>' +
        '<div class="conv-count">' + conv.count + ' messages</div>';
      div.onclick = () => loadConversation(conv);
      list.appendChild(div);
    });
  }
  document.getElementById('conv-overlay').classList.add('show');
}
function hideConversations() { document.getElementById('conv-overlay').classList.remove('show'); }

function loadConversation(conv) {
  if (!confirm('Load this conversation? Your current chat will be saved first.')) return;
  if (conversationHistory.length > 0) {
    const convs = loadConvs();
    const firstUserMsg = conversationHistory.find(m => m.role === 'user');
    convs.unshift({
      id: Date.now(),
      date: new Date().toISOString(),
      preview: firstUserMsg ? firstUserMsg.content.slice(0, 80) : '(no messages)',
      count: conversationHistory.length,
      messages: conversationHistory
    });
    saveConvs(convs.slice(0, 50));
  }
  conversationHistory = conv.messages;
  saveHistory(conversationHistory);
  hideConversations();
  document.getElementById('messages').innerHTML = '';
  conversationHistory.forEach(msg => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
  scrollToBottom();
}

function exportData() {
  const payload = {
    exported: new Date().toISOString(),
    facts: loadMemory(),
    history: loadHistory(),
    archive: loadArchive(),
    conversations: loadConvs()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vivienne-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Backup saved to Downloads.');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.facts) throw new Error('Invalid backup file.');
      if (!confirm('Import data? This replaces current data.')) return;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(data.history       || []));
      localStorage.setItem(MEMORY_KEY,  JSON.stringify(data.facts         || []));
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(data.archive       || []));
      localStorage.setItem(CONVS_KEY,   JSON.stringify(data.conversations || []));
      conversationHistory = loadHistory();
      persistentFacts     = loadMemory();
      document.getElementById('messages').innerHTML = '';
      if (conversationHistory.length === 0) showIntro();
      else {
        conversationHistory.forEach(msg => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
        scrollToBottom();
      }
      showToast('Imported successfully.');
    } catch (err) { alert('Import failed: ' + err.message); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

async function extractFacts(userMsg, aiReply) {
  try {
    const res = await callCerebras(
      'You are a personal memory extractor. Your ONLY job is to extract specific, concrete, personal facts about the USER (not story characters, not themes, not abstract concepts). Valid facts: the user\'s real name, where they live, their job, their age, their family members, their hobbies, projects they are working on, strong personal opinions they have stated. NEVER extract: character names from fiction, story themes, abstract words, emotions, or concepts. If the user has not revealed a specific personal fact, return []. Return ONLY a JSON array of short strings like ["Name is James", "Lives in Australia", "Building a chatbot app"]. No explanation.',
      'User said: "' + userMsg + '"\nAssistant replied: "' + aiReply + '"\n\nExtract ONLY real personal facts about the user, not about any fictional characters or story themes.',
      { json_mode: true, max_tokens: 300, temperature: 0.2 }
    );
    const newFacts = JSON.parse(res);
    if (Array.isArray(newFacts) && newFacts.length > 0) {
      newFacts.forEach(fact => {
        if (!persistentFacts.some(f => f.toLowerCase() === fact.toLowerCase())) persistentFacts.push(fact);
      });
      if (persistentFacts.length > 15) persistentFacts = persistentFacts.slice(-15);
      saveMemory(persistentFacts);
    }
  } catch (e) { /* silent */ }
}

async function sendMessage() {
  const input = document.getElementById('prompt');
  const text = input.value.trim();
  if (!text) return;
  document.getElementById('intro')?.remove();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text, ts: Date.now() });
  const typingId = showTyping();
  let systemPrompt = PERSONA;
  if (persistentFacts.length > 0) {
    systemPrompt += '\n\n--- MEMORY FROM PREVIOUS CONVERSATIONS ---\n' + persistentFacts.map(f => '• ' + f).join('\n') + '\n---';
  }
  try {
    const reply = await callCerebras(systemPrompt, null, {
      messages: toMistralMessages(conversationHistory),
      max_tokens: 800, temperature: 0.85
    });
    removeTyping(typingId);
    appendMessage('ai', reply);
    conversationHistory.push({ role: 'assistant', content: reply, ts: Date.now() });
    saveHistory(conversationHistory);
    if (conversationHistory.length % 6 === 0) extractFacts(text, reply);
  } catch (err) {
    removeTyping(typingId);
    appendMessage('ai', 'Error: ' + err.message);
  }
  document.getElementById('send-btn').disabled = false;
  scrollToBottom();
}

async function callCerebras(system, userMessage, options = {}) {
  const { json_mode = false, model = DEFAULT_MODEL, max_tokens = 800, temperature = 0.85, messages = null } = options;
  const msgs = messages || [{ role: 'user', content: userMessage }];
  let res;
  try {
    res = await fetch('/api/cerebras', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages: msgs, model, max_tokens, temperature, json_mode })
    });
  } catch { throw new Error('Network error — could not reach the server'); }
  let data;
  try { data = await res.json(); } catch { throw new Error('Server returned unreadable response (' + res.status + ')'); }
  if (!res.ok || data.error) throw new Error(data.error || 'Server error ' + res.status);
  if (!data.content) throw new Error('Empty response');
  return data.content;
}

function appendMessage(role, text, animate = true) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (!animate) div.style.animation = 'none';
  div.innerHTML = '<div class="msg-avatar">' + (role === 'ai' ? '<img src="./assets/vivienne.jpg" alt="V" style="width:100%;height:100%;object-fit:cover;object-position:center 15%;border-radius:50%;display:block;">' : 'U') + '</div><div class="msg-bubble">' + escapeHtml(text) + '</div>';
  wrap.appendChild(div);
  if (animate) scrollToBottom();
}
function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  const id = 'typing-' + Date.now();
  div.id = id; div.className = 'msg ai';
  div.innerHTML = '<div class="msg-avatar"><img src="./assets/vivienne.jpg" alt="V" style="width:100%;height:100%;object-fit:cover;object-position:center 15%;border-radius:50%;display:block;"></div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(div); scrollToBottom(); return id;
}
function removeTyping(id) { document.getElementById(id)?.remove(); }
function scrollToBottom() { const w = document.getElementById('messages'); w.scrollTop = w.scrollHeight; }
function escapeHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function useStarter(el) { document.getElementById('prompt').value = el.textContent; sendMessage(); }

function showIntro() {
  document.getElementById('messages').innerHTML =
    '<div id="intro">' +
    '<div class="intro-glyph"><img src="./assets/vivienne.jpg" alt="Vivienne" style="width:100%;height:100%;object-fit:cover;object-position:center 15%;display:block;"></div>' +
    '<div class="intro-name">VIVIENNE ASHCROFT</div>' +
    '<div class="intro-sub">Stories live with us.</div>' +
    '<div class="intro-starters">' +
    '<div class="starter" onclick="useStarter(this)">Who are you, really?</div>' +
    '<div class="starter" onclick="useStarter(this)">What do you know about me?</div>' +
    '<div class="starter" onclick="useStarter(this)">Tell me something I shouldn\'t know.</div>' +
    '</div></div>';
}

function clearMemory() {
  if (!confirm('All memory and history will be erased. Are you certain?')) return;
  persistentFacts = []; conversationHistory = [];
  saveMemory([]); saveHistory([]);
  localStorage.removeItem(ARCHIVE_KEY);
  localStorage.removeItem(CONVS_KEY);
  showIntro();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
    background:'rgba(155,80,255,0.92)', color:'#fff', padding:'8px 20px',
    borderRadius:'20px', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px',
    zIndex:'9999', pointerEvents:'none', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// INIT
if (conversationHistory.length > 0) {
  document.getElementById('intro')?.remove();
  conversationHistory.forEach(msg => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
  scrollToBottom();
}
runAutoArchive();

// Hamburger menu
function toggleMenu() { document.getElementById('menu-dropdown').classList.toggle('open'); }
function menuAction(fn) { document.getElementById('menu-dropdown').classList.remove('open'); fn(); }
document.addEventListener('click', e => {
  if (!e.target.closest('#menu-btn') && !e.target.closest('#menu-dropdown')) {
    document.getElementById('menu-dropdown').classList.remove('open');
  }
});

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('menu-dropdown').classList.remove('open');
  document.getElementById('import-input').click();
});
document.getElementById('import-input').addEventListener('change', importData);
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
